<header
  class="flex items-center justify-between border-b border-stone-200 bg-white px-4 py-3 sm:px-6 sm:py-4"
>
  <div class="flex items-center gap-3">
    <!-- Botón hamburguesa móvil -->
    <button
      type="button"
      class="flex items-center justify-center rounded-xl border border-stone-300 p-2 text-stone-700 transition hover:bg-stone-50 cursor-pointer lg:hidden"
      (click)="menuToggle.emit()"
      aria-label="Abrir menú"
    >
      <lucide-icon [img]="iconsService.menu" class="h-5 w-5" />
    </button>

    <div>
      <h1 class="text-base sm:text-lg font-bold text-[#1F1A17]">Sistema de reservaciones</h1>
      <p class="text-xs sm:text-sm text-stone-500">
        Bienvenido(a), {{ authService.user()?.firstName }}
      </p>
    </div>
  </div>

  <button
    type="button"
    class="flex items-center gap-1.5 sm:gap-2 rounded-xl border border-stone-300 px-3 py-1.5 sm:px-4 sm:py-2 text-xs sm:text-sm font-medium text-stone-700 transition hover:bg-stone-50 cursor-pointer"
    (click)="authService.logout()"
  >
    <lucide-icon [img]="iconsService.logOut" class="h-4 w-4" />
    <span class="hidden sm:inline">Cerrar sesión</span>
    <span class="sm:hidden">Salir</span>
  </button>
</header>
