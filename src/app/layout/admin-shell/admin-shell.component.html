<div class="min-h-screen bg-[#FFFDFC] text-[#1F1A17]">
  <div class="grid min-h-screen grid-cols-1 lg:grid-cols-[260px_1fr]">
    <!-- Sidebar desktop -->
    <div class="hidden lg:block">
      <app-sidebar />
    </div>

    <!-- Sidebar móvil overlay -->
    <div
      class="fixed inset-0 z-50 lg:hidden transition-all duration-300"
      [class.pointer-events-none]="!isMobileSidebarOpen()"
      [class.pointer-events-auto]="isMobileSidebarOpen()"
    >
      <!-- Backdrop -->
      <div
        class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-300 ease-out"
        [class.opacity-0]="!isMobileSidebarOpen()"
        [class.opacity-100]="isMobileSidebarOpen()"
        (click)="closeMobileSidebar()"
      ></div>

      <!-- Sidebar panel -->
      <div
        class="absolute left-0 top-0 h-full w-70 transition-transform duration-300 ease-out"
        [class.-translate-x-full]="!isMobileSidebarOpen()"
        [class.translate-x-0]="isMobileSidebarOpen()"
      >
        <app-sidebar (itemClick)="closeMobileSidebar()" />
      </div>
    </div>

    <div class="flex min-h-screen flex-col">
      <app-topbar (menuToggle)="toggleMobileSidebar()" />

      <main class="flex-1 p-4 sm:p-6">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
