<div class="min-h-screen bg-[#FFFDFC] p-6">
  <div class="mx-auto max-w-5xl">
    <div
      class="mb-6 flex items-center justify-between rounded-2xl border border-stone-200 bg-white p-5 shadow-sm"
    >
      <div>
        <h1 class="text-2xl font-bold text-stone-900">Dashboard</h1>
        <p class="text-sm text-stone-500">
          Bienvenid(a), {{ authService.user()?.firstName }} {{ authService.user()?.lastName }}
        </p>
      </div>

      <button
        type="button"
        class="rounded-xl border border-stone-300 px-4 py-2 text-sm font-medium text-stone-700 transition hover:bg-stone-50"
        (click)="authService.logout()"
      >
        Cerrar sesión
      </button>
    </div>

    <div class="rounded-2xl border border-stone-200 bg-white p-6 shadow-sm">
      <p class="text-sm text-stone-600">Login funcional conectado al backend.</p>
      <pre class="mt-4 overflow-auto rounded-xl bg-stone-100 p-4 text-xs text-stone-800">{{
        authService.user() | json
      }}</pre>
    </div>
  </div>
</div>
