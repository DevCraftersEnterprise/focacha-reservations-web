<div class="flex min-h-screen items-center justify-center bg-[#FFFDFC] px-4">
  <div class="w-full max-w-md rounded-2xl border border-stone-200 bg-white p-8 shadow-sm">
    <h1 class="mb-2 text-2xl font-bold text-stone-900">Iniciar sesión</h1>
    <p class="mb-6 text-sm text-shadow-stone-500">Sistema de reservaciones del restaurante</p>

    <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="mb-1 block text-sm font-medium text-stone-700">Correo</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-xl border px-4 py-3 outline-none transition"
          [class.border-red-400]="emailControl.invalid && emailControl.touched"
          [class.border-stone-300]="!(emailControl.invalid && emailControl.touched)"
          placeholder="correo@ejemplo.com"
        />

        @if (emailControl.invalid && emailControl.touched) {
          <p class="mt-1 text-sm text-red-600">Ingresa un correo válido.</p>
        }
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-stone-700">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-xl border px-4 py-3 outline-none transition"
          [class.border-red-400]="passwordControl.invalid && passwordControl.touched"
          [class.border-stone-300]="!(passwordControl.invalid && passwordControl.touched)"
          placeholder="••••••••"
        />

        @if (passwordControl.invalid && passwordControl.touched) {
          <p class="mt-1 text-sm text-red-600">La contraseña debe tener al menos 6 caracteres.</p>
        }
      </div>

      @if (errorMessage()) {
        <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        class="w-full rounded-xl bg-stone-900 px-4 py-3 text-sm font-semibold text-white transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="loading()"
      >
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
